{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm glass-card fade-in-up">
      <div class="card-body p-4">
        <h3 class="mb-3">Create Voter Account</h3>
        <form method="POST" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Age</label>
            <input type="number" name="age" min="18" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select" required>
              <option value="M">Male</option>
              <option value="F">Female</option>
              <option value="O">Other</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Previous Vote Pattern</label>
            <select name="prev_vote" class="form-select" required>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
            </select>
          </div>
          <div class="col-12">
            <button class="btn btn-success w-100">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
